version: "2"

run:
  timeout: 10m
  tests: true
linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - asciicheck
    - cyclop
    - decorder
    - unused
    - funlen
    - revive
    - funcorder
    - gocognit
    - goconst
    - gocritic
    - iface
    - importas
    - ireturn
    - interfacebloat
    - nestif
    - prealloc
    - sloglint
    - sqlclosecheck
    - testableexamples
    - unconvert
    - whitespace
    - wrapcheck
    - gosec
    - dupl
    - funlen
    - gocognit
    - misspell
    - varnamelen
    - wrapcheck
    - contextcheck
    - embeddedstructfieldcheck
    - fatcontext
    - godoclint
    - loggercheck
    - mnd
    - reassign
    - testpackage
linters-settings:
  revive:
    rules:
      - name: var-naming
        arguments:
          var: camelCase
          const: UPPER_CASE
          package: lower_case
        severity: warning
      - name: receiver-naming
      - name: import-shadowing
      - name: indent-error-flow
      - name: exported
      - name: comments
  varnamelen:
    min-len: 3
    max-len: 30
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - funlen
        - gocognit
        - cyclop
exclude:
  - "generated"
  - "vendor"
